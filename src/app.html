<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#0a0a0b" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Health" />
		<script>
			// Theme initialization — runs before first paint to prevent FOUC.
			// Reads localStorage('theme') ∈ {'auto', 'light', 'dark'}; defaults to 'auto'.
			(function () {
				try {
					var stored = localStorage.getItem('theme') || 'auto';
					var preferred =
						stored === 'auto'
							? window.matchMedia('(prefers-color-scheme: light)').matches
								? 'light'
								: 'dark'
							: stored;
					if (preferred === 'light') {
						document.documentElement.setAttribute('data-theme', 'light');
					}
				} catch (_) {
					/* localStorage unavailable — fall through to default (dark) */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
