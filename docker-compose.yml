services:
  postgres:
    image: postgres:16-alpine
    container_name: health-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
      POSTGRES_DB: health
      TZ: Europe/Lisbon
      PGTZ: Europe/Lisbon
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U health -d health']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
