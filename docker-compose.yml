services:
  postgres:
    image: postgres:16-alpine
    container_name: health-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
      POSTGRES_DB: health
      TZ: Europe/Lisbon
      PGTZ: Europe/Lisbon
    # Host port 5433 to avoid conflicting with other local Postgres on 5432.
    # Connect from the host with: postgres://health:health@localhost:5433/health
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U health -d health']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
